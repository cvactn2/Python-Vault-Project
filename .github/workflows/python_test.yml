name: Python Unit Tests

on:
  pull_request:
    branches: [ main ] # Only run for PRs targeting the main branch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent runs by caching dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov # Tools for testing and coverage
      - name: Run tests
        run: |
          pytest --cov=src tests/ # Runs tests and tracks coverage for the 'src' folder

